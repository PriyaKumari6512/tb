# =============================================================================
# Super-Resolution (SwinIR) Configuration
# =============================================================================

data:
  root: "${DATA_ROOT:./DDS3}"
  train_subfolders:
    - "TRAINING SET/100% NEGATIVE"
    - "TRAINING SET/90% NEGATIVE"
    - "TRAINING SET/50% NEGATIVE"
  val_subfolder: "VALIDATION SET/50% NEGATIVE"
  test_subfolder: "TEST SET/50% NEGATIVE"
  image_dir: "IMAGE"
  extension: ".bmp"
  scale: 4
  patch_size: 64          # HR crop size (LR will be patch_size/scale = 16)
  batch_size: 16
  num_workers: 4
  pin_memory: true

model:
  embed_dim: 180
  depths: [6, 6, 6, 6, 6, 6, 6, 6]
  num_heads: [6, 6, 6, 6, 6, 6, 6, 6]
  window_size: 8
  mlp_ratio: 2.0
  upscale: 4
  img_channels: 3
  resi_connection: "1conv"   # "1conv" or "3conv"
  upsampler: "pixelshuffle"

training:
  epochs: 200
  lr: 2.0e-4
  min_lr: 1.0e-7
  weight_decay: 0.0
  optimizer: "adamw"
  betas: [0.9, 0.99]
  scheduler: "cosine"
  warmup_epochs: 5
  amp: true
  clip_grad: 1.0
  multi_gpu: true           # auto-detect and use all GPUs
  save_every: 10
  patience: 30
  seed: 42
  loss:
    pixel: "l1"
    perceptual: true
    perceptual_weight: 0.1
    perceptual_layers: ["relu1_2", "relu2_2", "relu3_4", "relu4_4"]
  staged_finetuning:
    stage1_epochs: 30        # L1 only
    stage2_start: 31         # L1 + perceptual

checkpoint:
  dir: "${CKPT_DIR:./checkpoints}/sr"
  resume: null

logging:
  dir: "${LOG_DIR:./logs}/sr"
  run_id: "auto"
  tensorboard: true

inference:
  tile_size: 256
  tile_overlap: 32
  output_dir: "${OUTPUT_DIR:./outputs}/sr"
  output_format: "png"
