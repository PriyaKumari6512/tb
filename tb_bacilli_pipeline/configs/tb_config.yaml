# =============================================================================
# TB Bacilli Segmentation (SegFormer) Configuration
# =============================================================================

data:
  data_root: "${DATA_ROOT:./DDS3}"
  train_split: "TRAINING SET"
  train_subfolders:
    - "100% NEGATIVE"
    - "90% NEGATIVE"
    - "50% NEGATIVE"
  val_split: "VALIDATION SET"
  val_subfolders:
    - "50% NEGATIVE"
  # Oversample bacilli-rich images to handle class imbalance
  subfolder_weights:
    "100% NEGATIVE": 0.5   # mostly negative — down-weight
    "90% NEGATIVE": 1.0
    "50% NEGATIVE": 2.0    # highest bacilli density — up-weight
  image_size: 512

model:
  backbone: "nvidia/mit-b4"
  num_classes: 2             # background + bacilli
  pretrained: true
  local_pretrained_path: null  # path to a local .pth checkpoint (overrides HuggingFace download)

training:
  epochs: 100
  lr: 6.0e-5
  min_lr: 1.0e-7
  weight_decay: 0.01
  optimizer: "adamw"
  betas: [0.9, 0.999]
  scheduler: "cosine"
  warmup_epochs: 3
  amp: true
  clip_grad: 1.0
  multi_gpu: true
  batch_size: 8
  num_workers: 4
  save_every: 5
  patience: 20
  seed: 42
  loss:
    type: "focal_dice"       # focal_dice, dice_bce, dice, bce, focal
    focal_weight: 1.0
    dice_weight: 1.0
    alpha: 0.25              # focal: down-weight easy positives
    gamma: 2.0               # focal: focus on hard examples
    smooth: 1.0

checkpoint:
  dir: "${CKPT_DIR:./checkpoints}/tb"
  resume: null

logging:
  dir: "${LOG_DIR:./logs}/tb"
  run_id: "auto"
  tensorboard: true

postprocess:
  min_area: 10
  connectivity: 8
  conf_threshold: 0.5        # increase to reduce false positives

inference:
  output_dir: "${OUTPUT_DIR:./outputs}/tb"
  save_overlay: true
  save_mask: true
  overlay_alpha: 0.4
  bbox_color: [0, 255, 0]
  bbox_thickness: 2
